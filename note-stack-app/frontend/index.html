<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notestack</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1714;
      --paper: #f5f0e8;
      --paper-dark: #ede7d9;
      --accent: #c0392b;
      --accent-muted: #e8d5d3;
      --muted: #8a847a;
      --border: #d4cec4;
      --shadow: rgba(26,23,20,0.08);
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 27px,
          var(--border) 27px,
          var(--border) 28px
        );
    }

    /* Header */
    header {
      background: var(--ink);
      color: var(--paper);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
    }

    .logo span {
      color: var(--accent);
    }

    .note-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* Layout */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    /* Compose area */
    .compose {
      background: white;
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 2px;
      padding: 1.5rem;
      margin-bottom: 2.5rem;
      box-shadow: 0 2px 12px var(--shadow);
    }

    .compose-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .compose input[type="text"] {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 0.4rem 0;
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--ink);
      background: transparent;
      outline: none;
      margin-bottom: 1rem;
    }

    .compose input::placeholder { color: var(--border); }

    .compose textarea {
      width: 100%;
      border: none;
      resize: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      background: transparent;
      outline: none;
      min-height: 90px;
      line-height: 1.7;
    }

    .compose textarea::placeholder { color: var(--muted); }

    .compose-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .btn-save {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.6rem 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: opacity 0.15s;
    }

    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Section heading */
    .section-heading {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Notes grid */
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    /* Note card */
    .note-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1.25rem;
      position: relative;
      box-shadow: 0 1px 4px var(--shadow);
      animation: fadeIn 0.25s ease;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .note-card:hover {
      box-shadow: 0 4px 16px var(--shadow);
      transform: translateY(-2px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .note-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--paper-dark);
    }

    .note-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.3;
      color: var(--ink);
    }

    .note-content {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .note-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--border);
      letter-spacing: 0.04em;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--border);
      font-size: 0.75rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.05em;
      padding: 0.2rem 0.4rem;
      border-radius: 2px;
      transition: color 0.15s, background 0.15s;
    }

    .btn-delete:hover {
      color: var(--accent);
      background: var(--accent-muted);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    .empty p {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--ink);
      color: var(--paper);
      padding: 0.75rem 1.25rem;
      border-radius: 2px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Note<span>stack</span></div>
  <div class="note-count" id="noteCount">— notes</div>
</header>

<div class="container">

  <!-- Compose -->
  <div class="compose">
    <div class="compose-label">New Note</div>
    <input type="text" id="noteTitle" placeholder="Title your thought..." maxlength="255"/>
    <textarea id="noteContent" placeholder="Write something worth keeping..."></textarea>
    <div class="compose-footer">
      <button class="btn-save" id="saveBtn" onclick="createNote()">Save Note</button>
    </div>
  </div>

  <!-- Notes list -->
  <div class="section-heading">Your Notes</div>
  <div id="notesList"></div>

</div>

<div class="toast" id="toast"></div>

<script>
  const API = '';

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  async function fetchNotes() {
    const list = document.getElementById('notesList');
    list.innerHTML = '<div class="loading">Loading...</div>';
    try {
      const res = await fetch(`${API}/notes`);
      const notes = await res.json();
      renderNotes(notes);
    } catch (e) {
      list.innerHTML = '<div class="loading">Cannot reach API. Is the backend running?</div>';
    }
  }

  function renderNotes(notes) {
    const list = document.getElementById('notesList');
    document.getElementById('noteCount').textContent = `${notes.length} note${notes.length !== 1 ? 's' : ''}`;

    if (notes.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📋</div>
          <p>No notes yet. Write your first one above.</p>
        </div>`;
      return;
    }

    list.innerHTML = `<div class="notes-grid">${notes.map(n => `
      <div class="note-card" id="note-${n.id}">
        <div class="note-title">${escHtml(n.title)}</div>
        <div class="note-content">${escHtml(n.content)}</div>
        <div class="note-footer">
          <span class="note-date">${formatDate(n.created_at)}</span>
          <button class="btn-delete" onclick="deleteNote(${n.id})">delete</button>
        </div>
      </div>`).join('')}
    </div>`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function createNote() {
    const title = document.getElementById('noteTitle').value.trim();
    const content = document.getElementById('noteContent').value.trim();
    if (!title || !content) { showToast('Title and content required'); return; }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/notes`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content })
      });
      if (!res.ok) throw new Error();
      document.getElementById('noteTitle').value = '';
      document.getElementById('noteContent').value = '';
      showToast('Note saved');
      fetchNotes();
    } catch {
      showToast('Failed to save note');
    } finally {
      btn.disabled = false;
    }
  }

  async function deleteNote(id) {
    try {
      const res = await fetch(`${API}/notes/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error();
      document.getElementById(`note-${id}`)?.remove();
      showToast('Note deleted');
      fetchNotes();
    } catch {
      showToast('Failed to delete note');
    }
  }

  // Enter to save
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') createNote();
  });

  fetchNotes();
</script>
</body>
</html>
