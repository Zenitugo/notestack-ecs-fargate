# Use "compose.yaml" for modern projects
services:
  frontend:
    build: ./frontend                # Build from Dockerfile in frontend directory
    ports:
      - "3000:80"   
    volumes:
      - ./frontend:/usr/share/nginx/html:ro # Mount frontend code as read-only
    depends_on:
      - web                   # Ensure web starts before frontend
  web:
    build: ./backend                 # Build from Dockerfile in current directory
    ports:
      - "8000:8000"            # HostPort:ContainerPort
    env_file:
      - .env                   # Load environment variables from .env file
    depends_on:
      db:
        condition: service_healthy   # Ensure db starts before web

  db:
    image: postgres:15       # Pull pre-built image
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"] # Check if DB is ready
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data
    env_file:
      - .env                   # Load DB credentials from .env file
volumes:
  db-data:                   # Persistent storage definition
